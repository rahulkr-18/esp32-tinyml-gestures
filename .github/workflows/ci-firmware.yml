name: Firmware Build CI
on: [push, pull_request]

jobs:
  lint-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Check firmware folders exist
      run: |
        ls firmware_micropython && echo 'micropython folder OK'
        ls firmware_tflite && echo 'tflite folder OK'
